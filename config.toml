# 小宁的终极配置文件 (安全脱敏版)

[gateway.telegram]
token = "${TG_TOKEN}"
allowed_chats = [${TG_ALLOWED_CHATS}]

[agent]
model = "gemini-3-flash-preview"
name = "小宁"
heartbeat_interval = 900

[storage]
path = "/home/node/.openclaw/workspace"

# 自动任务与提醒

[cron."daily-reminder"]
schedule = "0 30 7 * * *"
message = "早安！记得带上你的充电器、耳机和餐巾纸哦！"
target = "telegram:${MY_CHAT_ID}"

[cron."water-reminder"]
schedule = "0 0 9-18 * * *"
message = "小宁提醒：该喝水啦！"
target = "telegram:${MY_CHAT_ID}"

[cron."heartbeat-poll"]
schedule = "0 */15 * * * *"
message = "Read HEARTBEAT.md if it exists (workspace context). Follow it strictly. If nothing needs attention, reply HEARTBEAT_OK."
target = "agent:main"
target = "telegram:${MY_CHAT_ID}"
